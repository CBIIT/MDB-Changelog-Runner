name: Publish to PyPI

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        run: python -m build

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  slack-notification:
    name: Slack notification
    needs: [publish]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Slack Notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: act10ns/slack@87c73aef9f8838eb6feae81589a6b1487a4a9e08  # v1.6.0
        with:
          status: ${{ needs.publish.result != 'success' && 'failure' || 'success' }}
          message: |
            *MDB Changelog Runner PyPI Release*
            <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ needs.publish.result != 'success' && 'Failure' || 'Success' }}>
